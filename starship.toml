format = """
[╭─](white) $directory$git_branch$git_commit$git_state$git_metrics$git_status
[╰─](white)$character """

[time]
disabled = false
style = "bold white"

[directory]
read_only = "🔒"
style = "bold cyan"
read_only_style = "red"
truncate_to_repo = false
truncation_length = 8
truncation_symbol = "…/"
repo_root_style = "bold italic #ffafcc"
format = "[$read_only]($read_only_style)[$path]($style) "
disabled = false

[git_branch]
truncation_length = 30
truncation_symbol = "…"

[git_commit]
tag_disabled = false

[git_status]
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'

[character]
format = "$symbol"
success_symbol = "[❯](bold green)"
error_symbol = "[✗](bold red) "
disabled = false
